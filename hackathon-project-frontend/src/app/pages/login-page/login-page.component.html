<div class="signup-container">
  <div class="signup-box">
    <h2>Login</h2>

    <form (ngSubmit)="login()">

      <input
        type="email"
        placeholder="Email"
        [(ngModel)]="email"
        name="email"
        required
      />

      <input
        type="password"
        placeholder="Password"
        [(ngModel)]="password"
        name="password"
        required
      />

      <button class="submitBtn" type="submit">Sign Up</button>

    </form>

    <!-- Login link -->
    <p class="login-link">
      No account?
      <a routerLink="/signup">Sign up here</a>
    </p>

  </div>
</div>
